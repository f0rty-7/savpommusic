<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sava&Pomom Music</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #121212; color: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; padding: 24px; }
        .card { background: #1f1f1f; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        button { padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; background: #1db954; color: white; }
        button.secondary { background: #333; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #2a2a2a; }
        audio { width: 100%; margin-top: 12px; }
        .muted { color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Sava&amp;Pomom Music</h1>
            <p class="muted">Откройте страницу, выберите трек и нажмите «Слушать».</p>
            <audio id="player" controls></audio>
            <p id="currentTrack" class="muted">Трек не выбран</p>
        </div>

        <div class="card">
            <h2>Список треков</h2>
            <ul id="songsList"></ul>
        </div>
    </div>

    <script>
        const songsList = document.getElementById('songsList');
        const player = document.getElementById('player');
        const currentTrack = document.getElementById('currentTrack');

        async function loadSongs() {
            const response = await fetch('/api/songs');
            const songs = await response.json();
            songsList.innerHTML = '';
            if (!songs.length) {
                songsList.innerHTML = '<li>Треки ещё не загружены.</li>';
                return;
            }

            songs.forEach(song => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div>
                        <strong>${song.title}</strong><br />
                        <span class="muted">${song.artist}${song.album ? ' • ' + song.album : ''}</span>
                    </div>
                    <div>
                        <button onclick="playSong(${song.id}, '${song.title}', '${song.artist}')">Слушать</button>
                    </div>
                `;
                songsList.appendChild(li);
            });
        }

        async function playSong(id, title, artist) {
            currentTrack.textContent = `Сейчас играет: ${artist} — ${title}`;
            player.src = `/api/songs/${id}/stream`;
            player.load();
            await player.play().catch(() => {
                currentTrack.textContent = 'Нажмите «Play» в плеере, чтобы начать воспроизведение';
            });
        }

        loadSongs();
    </script>
</body>
</html>
